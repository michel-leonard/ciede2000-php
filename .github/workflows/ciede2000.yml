name: PHP CIEDE2000 Testing

on:
  workflow_dispatch:

env:
  n_csv_lines: 10000000

jobs:
  test-implementation-de00-php:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - name: 📦 Set up PHP and GCC
        run: |
          command -v php > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes php-cli ; }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: ⚙️ Prepare PHP file
        run: |
          printf '%s\n' '' \
          '$canonical = (string)(int)(2 < $argc);' \
          "\$fp = fopen(\$argv[1], 'r');" \
          'while (($str = fgets($fp, 1024)) !== false)' \
          '	printf("%s,%.14f\n", rtrim($str), ciede2000(...array_map("floatval", explode(",", "$str,$canonical"))));' \
          'fclose($fp);' \
          '' >> ciede2000.php

      - name: 🛠️ Create custom php.ini
        run: |
          printf "%s\n" \
          "zend_extension=opcache.so" \
          "opcache.enable=1" \
          "opcache.enable_cli=1" \
          "opcache.jit=1105" \
          "opcache.jit_buffer_size=32M" \
          "memory_limit=64M" > settings.ini

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in PHP and stream to verifier
        run: |
          php -n -c settings.ini ciede2000.php test-cases.csv --canonical | ./ciede2000-native -o summary-canonical.txt &
          php -n -c settings.ini ciede2000.php test-cases.csv | ./ciede2000-native -o summary-simplified.txt &
          wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
